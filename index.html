<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Types of AI — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f1117;
    color: #f0ede8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 10% 20%, rgba(99,102,241,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 80%, rgba(236,72,153,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 56px 20px 36px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    margin-bottom: 44px;
  }

  .header-eyebrow {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #a78bfa;
    margin-bottom: 14px;
  }

  header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 5vw, 3.4rem);
    font-weight: 700;
    line-height: 1.1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #f0ede8 0%, #c4b5fd 60%, #818cf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: rgba(240,237,232,0.5);
    font-size: 14px;
    max-width: 460px;
    margin: 0 auto;
    line-height: 1.8;
  }

  .controls {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    padding: 0 20px;
  }

  .progress-text {
    font-size: 13px;
    color: rgba(240,237,232,0.4);
    letter-spacing: 1px;
    min-width: 80px;
    text-align: center;
  }

  .nav-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: #f0ede8;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.14); transform: scale(1.08); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; transform: none; }

  .shuffle-btn {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(240,237,232,0.5);
    padding: 8px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 3px;
  }

  .shuffle-btn:hover { border-color: #a78bfa; color: #a78bfa; }

  .progress-bar-wrap {
    position: relative;
    z-index: 1;
    max-width: 520px;
    margin: 0 auto 44px;
    padding: 0 20px;
  }

  .progress-bar-track {
    height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #818cf8, #c4b5fd);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .stage {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    padding: 0 20px;
    perspective: 1400px;
    margin-bottom: 28px;
  }

  .card-wrapper {
    width: 100%;
    max-width: 680px;
    height: 490px;
    position: relative;
    cursor: pointer;
  }

  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;
  }

  /* FRONT */
  .card-front {
    display: flex;
    flex-direction: column;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
  }

  .card-visual {
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }

  .card-visual svg {
    width: 90px;
    height: 90px;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 6px 28px rgba(0,0,0,0.4));
  }

  .card-visual::before {
    content: '';
    position: absolute;
    width: 260px; height: 260px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    top: -60px; right: -60px;
  }

  .card-visual::after {
    content: '';
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    bottom: -50px; left: -50px;
  }

  .card-body {
    background: #16192a;
    flex: 1;
    padding: 14px 30px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .card-term {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.1rem;
    font-weight: 700;
    line-height: 1.15;
    color: #f0ede8;
  }

  .card-front-definition {
    font-size: 15px;
    line-height: 1.85;
    color: rgba(240,237,232,0.78);
    flex: 1;
  }

  .flip-cue {
    font-size: 12px;
    color: rgba(240,237,232,0.22);
    letter-spacing: 1px;
    padding-top: 4px;
  }

  /* BACK */
  .card-back {
    transform: rotateY(180deg);
    background: #16192a;
    border: 1px solid rgba(255,255,255,0.07);
    box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    padding: 16px 26px 12px;
    gap: 0;
    isolation: isolate;
    z-index: 2;
  }

  .back-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 14px;
    margin-bottom: 8px;
  }

  .back-header-text {
    flex: 1;
    min-width: 0;
  }

  .back-eyebrow {
    font-size: 13px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 3px;
    display: block;
  }

  .back-term {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.9rem;
    font-weight: 700;
    color: #f0ede8;
    line-height: 1.15;
  }

  /* Icon thumbnail in top-right of back — uses emoji to avoid SVG mirror issues */
  .back-image {
    width: 72px;
    height: 72px;
    border-radius: 10px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    /* emoji doesn't get mirrored by the card flip */
  }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin-bottom: 10px;
  }

  /* Scenarios — stacked vertically */
  .back-scenarios {
    display: flex;
    flex-direction: column;
    gap: 40px;
    margin-bottom: 10px;
  }

  .back-scenario-block {
    background: rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 10px 14px;
    border-left: 3px solid rgba(255,255,255,0.18);
  }

  .back-scenario-tag {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.1px;
    color: rgba(240,237,232,0.95);
    margin-bottom: 5px;
    display: block;
  }

  .back-scenario-text {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(240,237,232,0.78);
    font-style: italic;
  }

  /* Examples — pushed toward bottom */
  .back-examples-wrap {
    margin-top: auto;
    padding-top: 6px;
  }

  .back-examples-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(240,237,232,0.35);
    margin-bottom: 8px;
  }

  .back-examples {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
  }

  .back-chip {
    padding: 5px 12px;
    font-size: 12px;
    border-radius: 20px;
    font-weight: 500;
    border: 1px solid;
  }

  .back-source {
    font-size: 11px;
    color: rgba(240,237,232,0.28);
    line-height: 1.7;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 10px;
    margin-top: 10px;
  }

  .flip-hint {
    position: relative;
    z-index: 1;
    text-align: center;
    font-size: 12px;
    color: rgba(240,237,232,0.2);
    letter-spacing: 1px;
    margin-bottom: 36px;
  }

  .dots {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 0 20px;
    max-width: 500px;
    margin: 0 auto;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    padding: 0;
  }

  .dot.active { background: #a78bfa; transform: scale(1.4); }
  .dot.seen { background: rgba(255,255,255,0.35); }

  .keyboard-hint {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-top: 28px;
    font-size: 11px;
    color: rgba(240,237,232,0.2);
    letter-spacing: 1px;
  }

  kbd {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 2px 7px;
    font-size: 10px;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
  }

  .stage.slide-out-left .card-wrapper { animation: slideOutLeft 0.22s ease forwards; }
  .stage.slide-out-right .card-wrapper { animation: slideOutRight 0.22s ease forwards; }
  .stage.slide-in-left .card-wrapper { animation: slideInLeft 0.22s ease forwards; }
  .stage.slide-in-right .card-wrapper { animation: slideInRight 0.22s ease forwards; }

  @keyframes slideOutLeft { to { transform: translateX(-70px); opacity: 0; } }
  @keyframes slideOutRight { to { transform: translateX(70px); opacity: 0; } }
  @keyframes slideInLeft { from { transform: translateX(70px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes slideInRight { from { transform: translateX(-70px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  @media (max-width: 500px) {
    .card-wrapper { height: 580px; }
    .card-back { padding: 14px 18px 12px; }
    .card-body { padding: 12px 18px 14px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">Lesson 2 — What Is AI?</div>
  <h1>Types of Artificial Intelligence</h1>
  <p>Click any card to flip it and reveal the full definition. Use arrows or keyboard to navigate.</p>
</header>

<div class="controls">
  <button class="nav-btn" id="prevBtn" onclick="navigate(-1)" disabled>←</button>
  <span class="progress-text" id="progressText">1 of 8</span>
  <button class="nav-btn" id="nextBtn" onclick="navigate(1)">→</button>
  <button class="shuffle-btn" onclick="shuffleCards()">⇄ Shuffle</button>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="progressFill" style="width:12.5%"></div>
  </div>
</div>

<div class="stage" id="stage">
  <div class="card-wrapper" id="cardWrapper">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront">
        <div class="card-visual" id="cardVisual"></div>
        <div class="card-body">
          <div class="card-term" id="cardTerm"></div>
          <div class="card-front-definition" id="cardFrontDef"></div>
          <div class="flip-cue">↺ flip for examples & scenarios</div>
        </div>
      </div>
      <div class="card-face card-back">
        <div class="back-header">
          <div class="back-header-text">
            <span class="back-eyebrow" id="backEyebrow">Examples of</span>
            <div class="back-term" id="backTerm"></div>
          </div>
          <div class="back-image" id="backImage"></div>
        </div>
        <div class="divider"></div>
        <div class="back-scenarios" id="backScenarios">
          <div class="back-scenario-block" id="backScenarioSchool">
            <span class="back-scenario-tag">🏫 In Schools</span>
            <div class="back-scenario-text" id="backScenarioSchoolText"></div>

          </div>
        </div>
        <div class="back-examples-wrap">
          <div class="back-examples-label">More Examples</div>
          <div class="back-examples" id="backExamples"></div>
        </div>
        <div class="back-source" id="backSource"></div>
      </div>
    </div>
  </div>
</div>

<div class="flip-hint" id="flipHint">Card 1 of 8</div>
<div class="dots" id="dots"></div>
<div class="keyboard-hint">
  <kbd>←</kbd> <kbd>→</kbd> navigate &nbsp;·&nbsp; <kbd>Space</kbd> flip
</div>

<script>

let currentIndex = 0;
let order = [...Array(cards.length).keys()];
let seen = new Set([0]);
let isAnimating = false;

function buildDots() {
  const container = document.getElementById('dots');
  container.innerHTML = '';
  order.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'dot' + (i === currentIndex ? ' active' : '') + (seen.has(i) && i !== currentIndex ? ' seen' : '');
    dot.onclick = () => goTo(i);
    dot.setAttribute('aria-label', `Card ${i+1}`);
    container.appendChild(dot);
  });
}

function updateCard(idx) {
  const card = cards[order[idx]];
  document.getElementById('cardInner').classList.remove('flipped');

  // Front visual band
  const frontVisual = document.getElementById('cardVisual');
  frontVisual.style.background = card.bgGradient;
  frontVisual.innerHTML = card.svg;

  // Front text
  document.getElementById('cardTerm').textContent = card.term;
  document.getElementById('cardFrontDef').textContent = card.definition;

  // Back eyebrow says "Examples of" followed by the term
  const backEyebrow = document.getElementById('backEyebrow');
  backEyebrow.textContent = 'Examples of';
  backEyebrow.style.color = card.color;
  document.getElementById('backTerm').textContent = card.term;

  // Back image — emoji icon (no SVG = no mirror problem)
  const backImg = document.getElementById('backImage');
  backImg.style.background = card.bgGradient;
  backImg.textContent = card.icon;

  // Accent color on scenario borders
  document.getElementById('backScenarioSchool').style.borderLeftColor = card.color + '90';
  document.getElementById('backScenarioWorld').style.borderLeftColor = card.color + '90';

  // Two scenarios
  document.getElementById('backScenarioSchoolText').textContent = card.scenarioSchool;
  document.getElementById('backScenarioWorldText').textContent = card.scenarioWorld;

  // Examples
  const backEx = document.getElementById('backExamples');
  backEx.innerHTML = '';
  card.examples.forEach(ex => {
    const chip = document.createElement('span');
    chip.className = 'back-chip';
    chip.textContent = ex;
    chip.style.background = card.chipBg;
    chip.style.borderColor = card.chipBorder;
    chip.style.color = card.chipText;
    backEx.appendChild(chip);
  });

  // Source
  document.getElementById('backSource').textContent = 'Source: ' + card.source;

  const total = order.length;
  document.getElementById('progressText').textContent = `${idx+1} of ${total}`;
  document.getElementById('progressFill').style.width = `${((idx+1)/total)*100}%`;
  document.getElementById('flipHint').textContent = `Card ${idx+1} of ${total}`;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === total - 1;
  buildDots();
}

function goTo(idx, direction) {
  if (isAnimating || idx === currentIndex) return;
  isAnimating = true;
  const stage = document.getElementById('stage');
  const dir = direction || (idx > currentIndex ? 1 : -1);
  stage.classList.add(dir > 0 ? 'slide-out-left' : 'slide-out-right');
  setTimeout(() => {
    stage.classList.remove('slide-out-left','slide-out-right');
    currentIndex = idx;
    seen.add(idx);
    updateCard(idx);
    stage.classList.add(dir > 0 ? 'slide-in-left' : 'slide-in-right');
    setTimeout(() => {
      stage.classList.remove('slide-in-left','slide-in-right');
      isAnimating = false;
    }, 240);
  }, 200);
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next >= 0 && next < order.length) goTo(next, dir);
}

function flipCard() {
  document.getElementById('cardInner').classList.toggle('flipped');
}

function shuffleCards() {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  seen = new Set([0]);
  currentIndex = 0;
  updateCard(0);
}

document.getElementById('cardWrapper').addEventListener('click', flipCard);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

updateCard(0);
</script>
